version: '3.8'

services:
  db:
    image: postgres:16
    container_name: kapi-sistemi-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kapi-network

  backend:
    build: ./backend
    container_name: kapi-sistemi-backend
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    depends_on:
      - db
    networks:
      - kapi-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    container_name: kapi-sistemi-frontend
    ports:
      - "8080:80"
    networks:
      - kapi-network

volumes:
  postgres_data:

networks:
  kapi-network:
    driver: bridge
