services:
  db:
    image: postgres:16
    container_name: kapi-sistemi-db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - kapi-network

  backend:
    build: ./backend
    container_name: kapi-sistemi-backend

    ports:
      - "${BACKEND_PORT}:3000"

    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    volumes:
      - ./backend/src:/app/src

    networks:
      - kapi-network

  frontend:
    build: ./frontend
    container_name: kapi-sistemi-frontend

    ports:
      - "8080:80"

    restart: unless-stopped

    depends_on:
      - backend

    networks:
      - kapi-network

volumes:
  postgres_data:

networks:
  kapi-network:
    driver: bridge